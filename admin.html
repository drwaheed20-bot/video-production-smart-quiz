<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>لوحة تحكم الاختبار</title><style>body{font-family:Tahoma,Arial;background:#08111f;color:#f8fafc;line-height:1.8}.wrap{max-width:850px;margin:auto;padding:22px}.card{background:#101d33;border:1px solid #29435f;border-radius:20px;padding:20px;margin:14px 0}input,select,textarea{width:100%;box-sizing:border-box;border-radius:12px;padding:10px;background:#071426;color:#fff;border:1px solid #29435f}button,a{display:inline-block;margin:6px;padding:10px 14px;border-radius:12px;background:#38bdf8;color:#03121f;text-decoration:none;border:0;font-weight:700}.red{background:#ef4444;color:white}.green{background:#22c55e}.note{background:#3a2a08;border:1px solid #f59e0b;padding:12px;border-radius:12px}</style></head><body><main class="wrap"><section class="card"><h1>لوحة تحكم اختبار إنتاج برامج الفيديو</h1><p class="note">هذه الصفحة تساعدك على إعداد ملف التحكم. بعد الضغط على نسخ الإعدادات افتح ملف settings.json في المستودع والصق النص ثم احفظ التعديل.</p></section><section class="card"><label>حالة الاختبار</label><select id="enabled"><option value="true">مفعل</option><option value="false">مغلق</option></select><label>عدد الأسئلة</label><input id="questionCount" type="number" min="5" max="300"><label>زمن الاختبار بالدقائق</label><input id="durationMinutes" type="number" min="5" max="240"><label>وقت الفتح اختياري</label><input id="startAt"><label>وقت الإغلاق اختياري</label><input id="endAt"><button class="green" onclick="setEnabled(true)">تفعيل</button><button class="red" onclick="setEnabled(false)">إيقاف</button><button onclick="applyForm()">تحديث</button><button onclick="copySettings()">نسخ الإعدادات</button></section><section class="card"><h2>نص ملف settings.json</h2><textarea id="jsonBox" style="height:300px;direction:ltr;text-align:left"></textarea><p><a href="index.html">فتح رابط الطالب</a></p></section></main><script>let s={};async function load(){try{s=await(await fetch('settings.json?'+Date.now())).json()}catch(e){s={enabled:true,questionCount:60,durationMinutes:45,startAt:'',endAt:''}}fill()}function fill(){enabled.value=String(s.enabled);questionCount.value=s.questionCount||60;durationMinutes.value=s.durationMinutes||45;startAt.value=s.startAt||'';endAt.value=s.endAt||'';jsonBox.value=JSON.stringify(s,null,2)}function applyForm(){s.enabled=enabled.value==='true';s.questionCount=Number(questionCount.value||60);s.durationMinutes=Number(durationMinutes.value||45);s.startAt=startAt.value.trim();s.endAt=endAt.value.trim();s.title='اختبار تفاعلي ذكي لمراجعة مقرر إنتاج برامج الفيديو';s.subtitle='بنك أسئلة عربي تكيفي بتغذية راجعة فورية';s.teacherName='د. محمد وحيد سليمان';s.lastUpdated=new Date().toISOString();fill()}function setEnabled(v){s.enabled=v;s.lastUpdated=new Date().toISOString();fill()}async function copySettings(){applyForm();await navigator.clipboard.writeText(jsonBox.value);alert('تم نسخ الإعدادات.')}load();</script></body></html>
