<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>اختبار إنتاج برامج الفيديو</title><style>body{margin:0;font-family:Tahoma;background:#08111f;color:white;direction:rtl;text-align:right}.wrap{max-width:900px;margin:auto;padding:24px}.card{background:#101d33;border:1px solid #29435f;border-radius:22px;padding:22px;margin:16px 0}button,input{font:inherit;border-radius:12px;padding:12px}button{background:#38bdf8;border:0;font-weight:bold}input{width:100%;background:#071426;color:white;border:1px solid #29435f}.opt{display:block;border:1px solid #29435f;background:#071426;border-radius:14px;padding:12px;margin:10px 0}.ok{border-color:#22c55e}.bad{border-color:#ef4444}.hide{display:none}.wm{position:fixed;inset:0;pointer-events:none;opacity:.07;transform:rotate(-25deg);font-weight:900;white-space:pre-wrap;line-height:5}</style></head><body><div id="wm" class="wm"></div><main class="wrap"><section id="startBox" class="card"><h1>اختبار تفاعلي ذكي لمراجعة مقرر إنتاج برامج الفيديو</h1><p>الاختبار عربي، من اليمين إلى اليسار، ويحتوي على 300 سؤال بدون زمن محدد.</p><input id="studentName" placeholder="اسم الطالب"><p><button onclick="beginQuiz()">ابدأ الاختبار</button></p></section><section id="quizBox" class="card hide"><p id="meta"></p><h2 id="questionText"></h2><div id="optionsBox"></div><div id="feedback"></div><button id="checkButton" onclick="checkAnswer()">تحقق</button><button id="nextButton" class="hide" onclick="nextQuestion()">التالي</button></section><section id="resultBox" class="card hide"><h2>تقرير المحاولة</h2><div id="resultText"></div><button onclick="location.reload()">محاولة جديدة</button></section></main><script>const seed=[['اختيار الكاميرا والميكروفون يعتمد على الميزانية والجودة المطلوبة ونوع الفيديو.',['صواب','خطأ'],0],['أدوات الإنتاج والمونتاج الحديثة أصبحت أكثر سهولة ويسرًا ومتوفرة بأسعار معقولة.',['صواب','خطأ'],0],['الاستبيانات والمقابلات هي طرق فعالة لفهم احتياجات الجمهور المستهدف.',['صواب','خطأ'],0],['استخدام الشاشات الخضراء يسمح باستبدال الخلفية الحقيقية بخلفية افتراضية في مرحلة المونتاج.',['صواب','خطأ'],0],['استخدام الفيديو التعليمي يزيد من الأعباء على المعلمين لأنه يتطلب منهم تغطية كل جوانب المنهج بأنفسهم.',['صواب','خطأ'],1],['إضاءة LED شائعة الاستخدام لأنها موفرة للطاقة ولا تنتج الكثير من الحرارة.',['صواب','خطأ'],0],['إضافة عناصر تفاعلية مثل الاختبارات والروابط غير ممكنة في الفيديوهات التعليمية الحديثة.',['صواب','خطأ'],1],['ما أول خطوة منطقية قبل تصوير فيديو تعليمي؟',['اختيار المؤثرات','تحليل الهدف والجمهور والمحتوى','النشر المباشر','إضافة الموسيقى'],1],['ما المقصود بالهدف التعليمي القابل للقياس؟',['هدف يمكن ملاحظة ناتجه وتقويمه','هدف طويل جدًا','هدف بلا زمن','هدف عام وغامض'],0],['أي عنصر يحدد ما سيقال وما سيظهر في كل مشهد؟',['الميكروفون','السيناريو','الحامل الثلاثي','منصة النشر'],1],['ما فائدة استخدام الحامل الثلاثي؟',['زيادة اهتزاز الصورة','تثبيت الكاميرا وتحسين جودة اللقطة','تغيير لون الخلفية','تسجيل الصوت'],1],['أي حركة تعني تدوير الكاميرا أفقيًا يمينًا أو يسارًا؟',['Pan','Tilt','Zoom','Cut'],0],['ما وظيفة Diffuser في الإضاءة؟',['تنعيم الضوء وتقليل الظلال الحادة','زيادة الضوضاء','تثبيت الكاميرا','حذف الخلفية'],0],['ما أفضل ممارسة عند تسجيل التعليق الصوتي؟',['التسجيل في مكان هادئ وبميكروفون مناسب','تشغيل موسيقى عالية أثناء التسجيل','الاعتماد دائمًا على ميكروفون الكاميرا','إهمال اختبار الصوت'],0],['ما المرحلة التي يتم فيها تجميع اللقطات وإضافة العناوين والمؤثرات؟',['ما قبل الإنتاج','الإنتاج','ما بعد الإنتاج','تحليل الجمهور'],2],['ما أفضل وصف للفيديو التفاعلي؟',['فيديو يسمح باستجابات الطالب داخل مسار التعلم','فيديو بلا أسئلة','ملف صوتي فقط','صورة ثابتة'],0],['ما المقصود بالمشاع الإبداعي Creative Commons؟',['تراخيص تسمح بالاستخدام وفق شروط محددة','منع كامل للاستخدام','ملكية خاصة فقط','حذف اسم المؤلف دائمًا'],0],['أي نوع فيديو يناسب شرح خطوات استخدام برنامج حاسوبي؟',['تسجيل الشاشة','مقابلة شخصية فقط','لقطة طبيعة','إعلان تجاري'],0],['ما فائدة الاختبار التجريبي للفيديو قبل نشره؟',['كشف مشكلات الفهم والصوت والتتابع','زيادة الأخطاء','إلغاء دور الجمهور','منع التغذية الراجعة'],0],['ما وظيفة التغذية الراجعة داخل الفيديو التفاعلي؟',['إخبار الطالب بصحة استجابته وتوجيهه','إلغاء التعلم','زيادة التشتيت','منع المحاولة'],0]];const topics=['التخطيط','الجمهور','السيناريو','التصوير','الإضاءة','الصوت','المونتاج','التفاعل','النشر','الحقوق'];let bank=[];for(let i=0;i<300;i++){let s=seed[i%seed.length];bank.push({q:s[0],o:s[1],a:s[2],topic:topics[i%topics.length]});}function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}let exam,cur,sel=null;function beginQuiz(){let n=studentName.value.trim();if(!n){alert('اكتب اسم الطالب');return}wm.textContent=Array(100).fill(n).join('   ');exam={name:n,i:0,score:0,list:shuffle(bank)};startBox.classList.add('hide');quizBox.classList.remove('hide');nextQuestion()}function nextQuestion(){if(exam.i>=300){finish();return}sel=null;feedback.innerHTML='';checkButton.classList.remove('hide');nextButton.classList.add('hide');cur=exam.list[exam.i];exam.i++;meta.textContent='السؤال '+exam.i+' / 300 | المحور: '+cur.topic+' | الدرجة الحالية: '+exam.score;questionText.textContent=cur.q;let os=shuffle(cur.o.map((t,i)=>({t,i})));cur.os=os;optionsBox.innerHTML=os.map((x,i)=>'<label class="opt"><input type="radio" name="a" onclick="sel='+i+'"> '+x.t+'</label>').join('')}function checkAnswer(){if(sel===null){alert('اختر إجابة');return}let ok=cur.os[sel].i===cur.a;if(ok)exam.score++;[...document.querySelectorAll('.opt')].forEach((l,i)=>{if(cur.os[i].i===cur.a)l.classList.add('ok');if(i===sel&&!ok)l.classList.add('bad')});feedback.innerHTML='<p><b>'+(ok?'إجابة صحيحة':'إجابة غير صحيحة')+'</b></p><p>الإجابة الصحيحة: '+cur.o[cur.a]+'</p>';checkButton.classList.add('hide');nextButton.classList.remove('hide')}function finish(){quizBox.classList.add('hide');resultBox.classList.remove('hide');resultText.innerHTML='<p>الطالب: <b>'+exam.name+'</b></p><p>الدرجة: <b>'+exam.score+' / 300</b></p><p>النسبة: <b>'+Math.round(exam.score/300*100)+'%</b></p>'}</script></body></html>
