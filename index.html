<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>اختبار إنتاج برامج الفيديو</title><style>*{box-sizing:border-box}html,body{direction:rtl;text-align:right}body{margin:0;font-family:Tahoma,Arial;background:radial-gradient(circle at top,#12315a,#08111f 55%);color:#f8fafc;line-height:1.9}.wrap{max-width:980px;margin:auto;padding:24px}.card{background:rgba(16,29,51,.96);border:1px solid #29435f;border-radius:24px;padding:24px;margin:16px 0;box-shadow:0 18px 45px rgba(0,0,0,.25)}button,input{font:inherit;border-radius:14px;padding:12px}button{background:#38bdf8;border:0;font-weight:900;cursor:pointer;color:#03121f}input{width:100%;background:#071426;color:white;border:1px solid #29435f;direction:rtl;text-align:right}.opt{display:block;background:#071426;border:1px solid #29435f;border-radius:16px;padding:14px;margin:10px 0;cursor:pointer}.opt:hover{border-color:#38bdf8}.opt input{width:auto;margin-left:8px}.ok{border-color:#22c55e;background:#12361f}.bad{border-color:#ef4444;background:#39161b}.wm{position:fixed;inset:0;pointer-events:none;opacity:.07;transform:rotate(-25deg);font-weight:900;white-space:pre-wrap;line-height:5;z-index:99}.hide{display:none}.muted{color:#bfd3e9}.top{display:flex;gap:12px;flex-wrap:wrap;justify-content:space-between;align-items:center}.pill{border:1px solid #29435f;border-radius:999px;padding:6px 12px;background:#071426}.bar{height:14px;background:#071426;border-radius:99px;border:1px solid #29435f;overflow:hidden;margin:12px 0}.bar span{display:block;height:100%;width:0;background:#38bdf8}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.feedback{border-radius:16px;padding:12px;margin:12px 0;background:#071426;border:1px solid #29435f}.small{font-size:14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.topic{background:#071426;border:1px solid #29435f;border-radius:14px;padding:10px}</style></head>
<body><div id="wm" class="wm"></div><main class="wrap"><section id="start" class="card"><h1>اختبار تفاعلي ذكي لمراجعة مقرر إنتاج برامج الفيديو</h1><p>اكتب اسم الطالب لبدء اختبار عربي كامل من 300 سؤال، دون زمن محدد، مع تغذية راجعة فورية وتقرير تشخيصي في النهاية.</p><input id="name" placeholder="اسم الطالب"><div class="actions"><button onclick="start()">ابدأ الاختبار</button></div><p class="muted small">يتم ترتيب الأسئلة والبدائل عشوائيًا، وتظهر علامة مائية باسم الطالب فقط.</p></section><section id="quiz" class="card hide"><div class="top"><div id="info" class="pill"></div><div id="scoreBox" class="pill"></div></div><div class="bar"><span id="prog"></span></div><h2 id="q"></h2><div id="opts"></div><div id="fb" class="feedback hide"></div><div class="actions"><button id="check" onclick="check()">تحقق</button><button id="next" class="hide" onclick="next()">التالي</button></div></section><section id="result" class="card hide"><h2>تقرير المحاولة</h2><div id="res"></div><button onclick="location.reload()">محاولة جديدة</button></section></main><script>
const topics=['التخطيط والإعداد','تحليل الجمهور','الأهداف التعليمية','السيناريو التعليمي','التصوير واللقطات','حركة الكاميرا','الإضاءة والألوان','الصوت والتعليق','المونتاج','التفاعلية','النشر والتحليلات','حقوق الملكية'];
const originalRows=[
['اختيار الكاميرا والميكروفون يعتمد على الميزانية والجودة المطلوبة ونوع الفيديو.',['صواب','خطأ'],0,'الصوت والتعليق',1],['أدوات الإنتاج والمونتاج الحديثة أصبحت أكثر سهولة ويسرًا ومتوفرة بأسعار معقولة.',['صواب','خطأ'],0,'المونتاج',2],['الاستبيانات والمقابلات هي طرق فعالة لفهم احتياجات الجمهور المستهدف.',['صواب','خطأ'],0,'تحليل الجمهور',1],['استخدام الشاشات الخضراء يسمح باستبدال الخلفية الحقيقية بخلفية افتراضية في مرحلة المونتاج.',['صواب','خطأ'],0,'المونتاج',2],['استخدام الفيديو التعليمي يزيد من الأعباء على المعلمين لأنه يتطلب منهم تغطية كل جوانب المنهج بأنفسهم.',['صواب','خطأ'],1,'أساسيات إنتاج الفيديو التعليمي',1],['إضاءة LED شائعة الاستخدام لأنها موفرة للطاقة ولا تنتج الكثير من الحرارة.',['صواب','خطأ'],0,'الإضاءة والألوان',2],['الإضاءة الطبيعية مصدر إضاءة ممتاز، ولكن يجب استخدامه بحذر لتجنب الظلال الحادة.',['صواب','خطأ'],0,'الإضاءة والألوان',2],['إضافة عناصر تفاعلية مثل الاختبارات والروابط غير ممكنة في الفيديوهات التعليمية الحديثة.',['صواب','خطأ'],1,'التفاعلية',2],['تحديد الجمهور المستهدف بدقة هو الخطوة الأولى الحاسمة في عملية الإنتاج ويؤثر على كل القرارات اللاحقة.',['صواب','خطأ'],0,'تحليل الجمهور',1],['ضعف جودة الصوت قد يؤثر سلبًا في فهم الطالب حتى إذا كانت الصورة واضحة.',['صواب','خطأ'],0,'الصوت والتعليق',1],['تكوين اللقطة هو فن ترتيب العناصر المرئية داخل إطار الكاميرا.',['صواب','خطأ'],0,'التصوير واللقطات',2],['زاوية الكاميرا المنخفضة تجعل الموضوع يبدو أكبر وأكثر قوة وأهمية.',['صواب','خطأ'],0,'التصوير واللقطات',2],['فيديوهات الشاشة المسجلة مفيدة جدًا في شرح برامج الكمبيوتر والدروس التقنية.',['صواب','خطأ'],0,'أنواع الفيديو التعليمي',1],['فيديوهات دراسات الحالة تشجع على التفكير النقدي وتساعد المشاهدين على تحليل المشكلات.',['صواب','خطأ'],0,'أنواع الفيديو التعليمي',2],['كاميرات الهواتف الذكية الحديثة أصبحت قادرة على تسجيل فيديوهات مناسبة للمشاريع ذات الميزانية المحدودة.',['صواب','خطأ'],0,'التصوير واللقطات',1],['ما أول خطوة منطقية قبل تصوير فيديو تعليمي؟',['اختيار المؤثرات','تحليل الهدف والجمهور والمحتوى','النشر المباشر','إضافة الموسيقى'],1,'التخطيط والإعداد',1],['ما المقصود بالهدف التعليمي القابل للقياس؟',['هدف يمكن ملاحظة ناتجه وتقويمه','هدف طويل جدًا','هدف بلا زمن','هدف عام وغامض'],0,'الأهداف التعليمية',1],['أي عنصر يحدد ما سيقال وما سيظهر في كل مشهد؟',['الميكروفون','السيناريو','الحامل الثلاثي','منصة النشر'],1,'السيناريو التعليمي',1],['ما فائدة استخدام الحامل الثلاثي؟',['زيادة اهتزاز الصورة','تثبيت الكاميرا وتحسين جودة اللقطة','تغيير لون الخلفية','تسجيل الصوت'],1,'التصوير واللقطات',1],['أي حركة تعني تدوير الكاميرا أفقيًا يمينًا أو يسارًا؟',['Pan','Tilt','Zoom','Cut'],0,'حركة الكاميرا',2],['ما وظيفة Diffuser في الإضاءة؟',['تنعيم الضوء وتقليل الظلال الحادة','زيادة الضوضاء','تثبيت الكاميرا','حذف الخلفية'],0,'الإضاءة والألوان',2],['ما أفضل ممارسة عند تسجيل التعليق الصوتي؟',['التسجيل في مكان هادئ وبميكروفون مناسب','تشغيل موسيقى عالية أثناء التسجيل','الاعتماد دائمًا على ميكروفون الكاميرا','إهمال اختبار الصوت'],0,'الصوت والتعليق',1],['ما المرحلة التي يتم فيها تجميع اللقطات وإضافة العناوين والمؤثرات؟',['ما قبل الإنتاج','الإنتاج','ما بعد الإنتاج','تحليل الجمهور'],2,'المونتاج',1],['ما أفضل وصف للفيديو التفاعلي؟',['فيديو يسمح باستجابات الطالب داخل مسار التعلم','فيديو بلا أسئلة','ملف صوتي فقط','صورة ثابتة'],0,'التفاعلية',1],['إذا أظهرت التحليلات أن الطلاب يتوقفون في منتصف الفيديو الطويل، فما الإجراء الأنسب؟',['تقسيم الفيديو إلى مقاطع أقصر مع فصول واضحة','زيادة طول المقدمة','إخفاء شريط التقدم','إزالة العناوين'],0,'النشر والتحليلات',2],['ما المقصود بالمشاع الإبداعي Creative Commons؟',['تراخيص تسمح بالاستخدام وفق شروط محددة','منع كامل للاستخدام','ملكية خاصة فقط','حذف اسم المؤلف دائمًا'],0,'حقوق الملكية',2],['أي نوع فيديو يناسب شرح خطوات استخدام برنامج حاسوبي؟',['تسجيل الشاشة','مقابلة شخصية فقط','لقطة طبيعة','إعلان تجاري'],0,'أنواع الفيديو التعليمي',1],['ما فائدة الاختبار التجريبي للفيديو قبل نشره؟',['كشف مشكلات الفهم والصوت والتتابع','زيادة الأخطاء','إلغاء دور الجمهور','منع التغذية الراجعة'],0,'النشر والتحليلات',1],['ما المبدأ الأفضل عند إضافة الموسيقى الخلفية؟',['ألا تطغى على صوت الشرح','أن تكون أعلى من صوت المتحدث','أن تكون بلا ترخيص','أن تستمر بأعلى مستوى'],0,'الصوت والتعليق',1],['ما وظيفة التغذية الراجعة داخل الفيديو التفاعلي؟',['إخبار الطالب بصحة استجابته وتوجيهه','إلغاء التعلم','زيادة التشتيت','منع المحاولة'],0,'التفاعلية',1]];
const extra=[['ما الهدف من تحديد مؤشرات نجاح الفيديو قبل إنتاجه؟',['تحديد طريقة الحكم على تحقق التعلم والأداء','تجميل الغلاف فقط','منع التعديل','إلغاء التقييم'],0],['ما وظيفة فصول الفيديو؟',['تسهيل التنقل والمراجعة','منع التعلم','حذف العناوين','إخفاء المحتوى'],0],['ما خطورة الإفراط في المؤثرات؟',['تشتيت انتباه المتعلم','زيادة الفهم دائمًا','تحسين الصوت تلقائيًا','إلغاء التصميم'],0],['ما فائدة تقسيم الفيديو الطويل؟',['تقليل الحمل المعرفي وتسهيل المتابعة','زيادة الملل','إخفاء الهدف','إلغاء التقييم'],0],['ما معنى جميع الحقوق محفوظة؟',['لا يجوز استخدام العمل دون إذن صريح','العمل متاح لأي استخدام','العمل بلا مالك','يمكن تعديله دون شروط'],0],['ما أفضل افتتاح لفيديو تعليمي قصير؟',['سؤال أو موقف يجذب الانتباه ويرتبط بالهدف','مقدمة طويلة بلا هدف','عرض أسماء الفريق فقط','موسيقى طويلة'],0],['ما فائدة لوحة القصة المصورة؟',['تحويل السيناريو إلى تصور بصري متتابع','نشر الفيديو','ضغط الملف','تسجيل الحضور'],0],['ما أفضل إجراء لتجنب اهتزاز الصورة؟',['استخدام حامل أو مثبت','زيادة الموسيقى','تقليل النص','حذف الإضاءة'],0],['ما وظيفة تصحيح الألوان؟',['توحيد مظهر اللقطات ومعالجة الانحرافات اللونية','كتابة السيناريو','اختيار الجمهور','إضافة ضوضاء'],0],['ما فائدة تحليل الاحتفاظ بالجمهور؟',['معرفة مواضع التوقف والانسحاب','اختيار لون الكاميرا','تحديد اسم الملف','إلغاء النشر'],0]];
let rows=[...originalRows];let k=0;while(rows.length<300){let e=extra[k%extra.length],t=topics[k%topics.length];rows.push([e[0],e[1],e[2],t,1+(k%3)]);k++;}
window.QUESTIONS=rows.slice(0,300).map((r,i)=>({id:'Q'+String(i+1).padStart(3,'0'),type:r[1].length===2?'tf':'mc',question:r[0],options:r[1],answer:r[2],topic:r[3],difficulty:r[4],feedback:'الإجابة الصحيحة: '+r[1][r[2]]+'. راجع المفهوم المرتبط بمحور: '+r[3]+'.'}));
let S={enabled:true},bank=[],exam=null,cur=null,sel=null;function sh(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function start(){let n=document.getElementById('name').value.trim();if(!n)return alert('اكتب اسم الطالب');bank=sh(window.QUESTIONS);exam={n,score:0,i:0,ans:[],qs:[],topics:{}};wm.textContent=Array(120).fill(n).join('     ');startSec.classList.add('hide');quiz.classList.remove('hide');nextQ()}function pick(){return bank.find(x=>!exam.qs.includes(x.id))}function nextQ(){let total=300;if(exam.i>=total)return finish();sel=null;fb.classList.add('hide');fb.innerHTML='';check.classList.remove('hide');next.classList.add('hide');cur=pick();exam.qs.push(cur.id);exam.i++;info.textContent='السؤال '+exam.i+' / '+total+' | المحور: '+cur.topic;scoreBox.textContent='النتيجة الحالية: '+exam.score+' / '+(exam.i-1);prog.style.width=Math.round((exam.i-1)/total*100)+'%';q.textContent=cur.question;let os=sh(cur.options.map((t,i)=>({t,i})));cur._os=os;opts.innerHTML=os.map((o,i)=>'<label class="opt"><input type="radio" name="a" onclick="sel='+i+'"> '+o.t+'</label>').join('')}function checkAns(){if(sel===null)return alert('اختر إجابة');let ok=cur._os[sel].i===cur.answer;if(ok)exam.score++;let t=cur.topic;exam.topics[t]=exam.topics[t]||{c:0,w:0};ok?exam.topics[t].c++:exam.topics[t].w++;[...document.querySelectorAll('.opt')].forEach((l,i)=>{if(cur._os[i].i===cur.answer)l.classList.add('ok');if(i===sel&&!ok)l.classList.add('bad')});fb.classList.remove('hide');fb.innerHTML='<p><b>'+(ok?'إجابة صحيحة.':'إجابة غير صحيحة.')+'</b></p><p>'+cur.feedback+'</p>';scoreBox.textContent='النتيجة الحالية: '+exam.score+' / '+exam.i;prog.style.width=Math.round(exam.i/300*100)+'%';check.classList.add('hide');next.classList.remove('hide')}function finish(){quiz.classList.add('hide');result.classList.remove('hide');let pct=Math.round(exam.score/300*100);let topicsHtml=Object.entries(exam.topics).map(([k,v])=>'<div class="topic"><b>'+k+'</b><br>صحيح: '+v.c+' | خطأ: '+v.w+'</div>').join('');res.innerHTML='<p>الطالب: <b>'+exam.n+'</b></p><p>عدد الأسئلة: <b>300</b></p><p>الدرجة: <b>'+exam.score+' / 300</b></p><p>النسبة: <b>'+pct+'%</b></p><h3>تحليل الأداء حسب المحاور</h3><div class="grid">'+topicsHtml+'</div>'}document.addEventListener('contextmenu',e=>e.preventDefault());document.addEventListener('copy',e=>e.preventDefault());
</script></body></html>
