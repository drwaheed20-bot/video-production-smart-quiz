<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>اختبار إنتاج برامج الفيديو</title><style>*{box-sizing:border-box}html,body{direction:rtl;text-align:right}body{margin:0;font-family:Tahoma,Arial;background:radial-gradient(circle at top,#12315a,#08111f 55%);color:#f8fafc;line-height:1.9}.wrap{max-width:980px;margin:auto;padding:24px}.card{background:rgba(16,29,51,.96);border:1px solid #29435f;border-radius:24px;padding:24px;margin:16px 0;box-shadow:0 18px 45px rgba(0,0,0,.25)}button,input{font:inherit;border-radius:14px;padding:12px}button{background:#38bdf8;border:0;font-weight:900;cursor:pointer;color:#03121f}input{width:100%;background:#071426;color:white;border:1px solid #29435f;direction:rtl;text-align:right}.opt{display:block;background:#071426;border:1px solid #29435f;border-radius:16px;padding:14px;margin:10px 0;cursor:pointer}.opt:hover{border-color:#38bdf8}.opt input{width:auto;margin-left:8px}.ok{border-color:#22c55e;background:#12361f}.bad{border-color:#ef4444;background:#39161b}.wm{position:fixed;inset:0;pointer-events:none;opacity:.07;transform:rotate(-25deg);font-weight:900;white-space:pre-wrap;line-height:5;z-index:99}.hide{display:none}.muted{color:#bfd3e9}.top{display:flex;gap:12px;flex-wrap:wrap;justify-content:space-between;align-items:center}.pill{border:1px solid #29435f;border-radius:999px;padding:6px 12px;background:#071426}.bar{height:14px;background:#071426;border-radius:99px;border:1px solid #29435f;overflow:hidden;margin:12px 0}.bar span{display:block;height:100%;width:0;background:#38bdf8}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.feedback{border-radius:16px;padding:12px;margin:12px 0;background:#071426;border:1px solid #29435f}.small{font-size:14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.topic{background:#071426;border:1px solid #29435f;border-radius:14px;padding:10px}</style></head>
<body><div id="wm" class="wm"></div><main class="wrap"><section id="start" class="card"><h1>اختبار تفاعلي ذكي لمراجعة مقرر إنتاج برامج الفيديو</h1><p>اكتب اسم الطالب لبدء اختبار عربي كامل من 300 سؤال، دون زمن محدد، مع تغذية راجعة فورية وتقرير تشخيصي في النهاية.</p><input id="name" placeholder="اسم الطالب"><div class="actions"><button onclick="start()">ابدأ الاختبار</button></div><p class="muted small">يتم ترتيب الأسئلة والبدائل عشوائيًا، وتظهر علامة مائية باسم الطالب فقط.</p></section><section id="quiz" class="card hide"><div class="top"><div id="info" class="pill"></div><div id="scoreBox" class="pill"></div></div><div class="bar"><span id="prog"></span></div><h2 id="q"></h2><div id="opts"></div><div id="fb" class="feedback hide"></div><div class="actions"><button id="check" onclick="check()">تحقق</button><button id="next" class="hide" onclick="next()">التالي</button></div></section><section id="result" class="card hide"><h2>تقرير المحاولة</h2><div id="res"></div><button onclick="location.reload()">محاولة جديدة</button></section></main><script src="qdata1.js?v=20260605b"></script><script src="qdata3.js?v=20260605b"></script><script src="qdata4.js?v=20260605b"></script><script src="qdata5.js?v=20260605b"></script><script src="questions.js?v=20260605b"></script><script>
let S={enabled:true,questionCount:300,durationMinutes:0,adaptive:true,shuffleOptions:true}, bank=[], exam=null, cur=null, sel=null;
fetch('settings.json?'+Date.now()).then(r=>r.json()).then(j=>{S=Object.assign(S,j);S.questionCount=300;S.durationMinutes=0}).catch(()=>{}).finally(()=>{if(!S.enabled){document.getElementById('start').innerHTML='<h1>الاختبار مغلق حاليًا</h1><p>سيتم تفعيل الرابط عند سماح المشرف.</p>'}});
function sh(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function start(){let n=document.getElementById('name').value.trim();if(!n)return alert('اكتب اسم الطالب');bank=sh(window.QUESTIONS||[]);if(!bank.length){alert('لم يتم تحميل بنك الأسئلة. اضغط تحديث للصفحة ثم أعد المحاولة.');return}exam={n,score:0,i:0,level:2,ans:[],qs:[],topics:{}};document.getElementById('wm').textContent=Array(120).fill(n).join('     ');document.getElementById('start').classList.add('hide');document.getElementById('quiz').classList.remove('hide');next()}
function pick(){let left=bank.filter(x=>!exam.qs.includes(x.id));let p=left.filter(x=>(x.difficulty||2)==exam.level);return sh(p.length?p:left)[0]}
function next(){let total=Math.min(300,bank.length);if(exam.i>=total)return finish();sel=null;fb.classList.add('hide');fb.innerHTML='';nextBtn(false);cur=pick();if(!cur)return finish();exam.qs.push(cur.id);exam.i++;info.textContent='السؤال '+exam.i+' / '+total+' | المحور: '+(cur.topic||'إنتاج برامج الفيديو')+' | المستوى: '+(cur.difficulty||2);scoreBox.textContent='النتيجة الحالية: '+exam.score+' / '+(exam.i-1);prog.style.width=Math.round((exam.i-1)/total*100)+'%';q.textContent=cur.question;let os=cur.options.map((t,i)=>({t,i}));if(S.shuffleOptions!==false)os=sh(os);cur._os=os;opts.innerHTML=os.map((o,i)=>'<label class="opt"><input type="radio" name="a" onclick="sel='+i+'"> '+o.t+'</label>').join('')}
function nextBtn(done){check.classList.toggle('hide',done);next.classList.toggle('hide',!done)}
function check(){if(sel===null)return alert('اختر إجابة');let ok=cur._os[sel].i==cur.answer;if(ok){exam.score++;exam.level=Math.min(3,exam.level+1)}else exam.level=Math.max(1,exam.level-1);let t=cur.topic||'عام';exam.topics[t]=exam.topics[t]||{c:0,w:0};ok?exam.topics[t].c++:exam.topics[t].w++;exam.ans.push({id:cur.id,topic:t,ok});[...document.querySelectorAll('.opt')].forEach((l,i)=>{if(cur._os[i].i==cur.answer)l.classList.add('ok');if(i==sel&&!ok)l.classList.add('bad')});fb.classList.remove('hide');fb.innerHTML='<p><b>'+(ok?'إجابة صحيحة.':'إجابة غير صحيحة.')+'</b></p><p>'+(cur.feedback||'راجع الفكرة المرتبطة بهذا السؤال.')+'</p>';scoreBox.textContent='النتيجة الحالية: '+exam.score+' / '+exam.i;prog.style.width=Math.round(exam.i/Math.min(300,bank.length)*100)+'%';nextBtn(true)}
function finish(){quiz.classList.add('hide');result.classList.remove('hide');let total=Math.min(300,bank.length), pct=Math.round(exam.score/total*100);let topics=Object.entries(exam.topics).map(([k,v])=>'<div class="topic"><b>'+k+'</b><br>صحيح: '+v.c+' | خطأ: '+v.w+'</div>').join('');res.innerHTML='<p>الطالب: <b>'+exam.n+'</b></p><p>عدد الأسئلة: <b>'+total+'</b></p><p>الدرجة: <b>'+exam.score+' / '+total+'</b></p><p>النسبة: <b>'+pct+'%</b></p><h3>تحليل الأداء حسب المحاور</h3><div class="grid">'+topics+'</div><p class="muted">لا يوجد زمن محدد للاختبار.</p>'}
document.addEventListener('contextmenu',e=>e.preventDefault());document.addEventListener('copy',e=>e.preventDefault());
</script></body></html>
