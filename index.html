<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>اختبار إنتاج برامج الفيديو</title><style>*{box-sizing:border-box}html,body{direction:rtl;text-align:right}body{margin:0;font-family:Tahoma,Arial;background:#08111f;color:#f8fafc;line-height:1.9}.wrap{max-width:950px;margin:auto;padding:24px}.card{background:#101d33;border:1px solid #29435f;border-radius:22px;padding:22px;margin:15px 0;direction:rtl;text-align:right}button,input{font:inherit;border-radius:12px;padding:12px}button{background:#38bdf8;border:0;font-weight:700;cursor:pointer}input{width:100%;box-sizing:border-box;background:#071426;color:white;border:1px solid #29435f;direction:rtl;text-align:right}.opt{display:block;background:#071426;border:1px solid #29435f;border-radius:14px;padding:12px;margin:10px 0;direction:rtl;text-align:right}.opt input{width:auto;margin-left:8px}.ok{border-color:#22c55e;background:#12361f}.bad{border-color:#ef4444;background:#39161b}.wm{position:fixed;inset:0;pointer-events:none;opacity:.07;transform:rotate(-25deg);font-weight:900;white-space:pre-wrap;line-height:5;z-index:99}.hide{display:none}.muted{color:#bfd3e9}.top{display:flex;gap:12px;flex-wrap:wrap;justify-content:space-between;align-items:center}.pill{border:1px solid #29435f;border-radius:999px;padding:6px 12px;background:#071426}</style></head>
<body><div id="wm" class="wm"></div><main class="wrap"><section id="start" class="card"><h1>اختبار تفاعلي ذكي لمراجعة مقرر إنتاج برامج الفيديو</h1><p>يجب كتابة اسم الطالب قبل بدء الاختبار. جميع أسئلة بنك المراجعة، وعددها 300 سؤال، متاحة في المحاولة دون زمن محدد.</p><input id="name" placeholder="اسم الطالب"><br><br><button onclick="start()">ابدأ الاختبار</button><p class="muted">ملاحظة: يتم ترتيب الأسئلة والبدائل عشوائيًا، مع تغذية راجعة فورية بعد كل سؤال.</p></section><section id="quiz" class="card hide"><div class="top"><div id="info" class="pill"></div><div id="scoreBox" class="pill"></div></div><h2 id="q"></h2><div id="opts"></div><div id="fb"></div><button id="check" onclick="check()">تحقق</button><button id="next" class="hide" onclick="next()">التالي</button></section><section id="result" class="card hide"><h2>تقرير المحاولة</h2><div id="res"></div><button onclick="location.reload()">محاولة جديدة</button></section></main><script src="questions.js"></script><script>
let S={enabled:true,questionCount:300,durationMinutes:0,adaptive:true,shuffleOptions:true}, bank=[], exam=null, cur=null, sel=null;
fetch('settings.json?'+Date.now()).then(r=>r.json()).then(j=>{S=Object.assign(S,j);S.questionCount=300;S.durationMinutes=0}).catch(()=>{}).finally(()=>{if(!S.enabled){document.getElementById('start').innerHTML='<h1>الاختبار مغلق حاليًا</h1>'}});
function sh(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function start(){let n=document.getElementById('name').value.trim();if(!n)return alert('اكتب اسم الطالب');bank=sh(window.QUESTIONS||[]);exam={n,score:0,i:0,level:2,ans:[],qs:[]};document.getElementById('wm').textContent=Array(80).fill(n+' | اختبار إنتاج برامج الفيديو').join('     ');document.getElementById('start').classList.add('hide');document.getElementById('quiz').classList.remove('hide');next()}
function pick(){let left=bank.filter(x=>!exam.qs.includes(x.id));let p=left.filter(x=>(x.difficulty||2)==exam.level);return sh(p.length?p:left)[0]}
function next(){let total=Math.min(300,bank.length);if(exam.i>=total)return finish();sel=null;document.getElementById('fb').innerHTML='';document.getElementById('next').classList.add('hide');document.getElementById('check').classList.remove('hide');cur=pick();exam.qs.push(cur.id);exam.i++;document.getElementById('info').textContent='السؤال '+exam.i+' / '+total+' | المحور: '+(cur.topic||'إنتاج برامج الفيديو')+' | المستوى: '+(cur.difficulty||2);document.getElementById('scoreBox').textContent='النتيجة الحالية: '+exam.score+' / '+(exam.i-1);document.getElementById('q').textContent=cur.question;let os=cur.options.map((t,i)=>({t,i}));if(S.shuffleOptions!==false)os=sh(os);cur._os=os;document.getElementById('opts').innerHTML=os.map((o,i)=>'<label class="opt"><input type="radio" name="a" onclick="sel='+i+'"> '+o.t+'</label>').join('')}
function check(){if(sel===null)return alert('اختر إجابة');let ok=cur._os[sel].i==cur.answer; if(ok){exam.score++;exam.level=Math.min(3,exam.level+1)}else exam.level=Math.max(1,exam.level-1);exam.ans.push({id:cur.id,topic:cur.topic,ok});let labs=[...document.querySelectorAll('.opt')];labs.forEach((l,i)=>{if(cur._os[i].i==cur.answer)l.classList.add('ok'); if(i==sel&&!ok)l.classList.add('bad')});document.getElementById('fb').innerHTML='<p><b>'+(ok?'إجابة صحيحة.':'إجابة غير صحيحة.')+'</b></p><p>'+(cur.feedback||'راجع الفكرة المرتبطة بهذا السؤال.')+'</p>';document.getElementById('scoreBox').textContent='النتيجة الحالية: '+exam.score+' / '+exam.i;document.getElementById('check').classList.add('hide');document.getElementById('next').classList.remove('hide')}
function finish(){document.getElementById('quiz').classList.add('hide');document.getElementById('result').classList.remove('hide');let total=Math.min(300,bank.length), pct=Math.round(exam.score/total*100);document.getElementById('res').innerHTML='<p>الطالب: <b>'+exam.n+'</b></p><p>عدد الأسئلة المتاحة: <b>'+total+'</b></p><p>الدرجة: <b>'+exam.score+' / '+total+'</b></p><p>النسبة: <b>'+pct+'%</b></p><p>لا يوجد زمن محدد للاختبار.</p>'}
document.addEventListener('contextmenu',e=>e.preventDefault());document.addEventListener('copy',e=>e.preventDefault());
</script></body></html>
